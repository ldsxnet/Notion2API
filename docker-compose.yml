services:
  notion2api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notion2api
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
    command: ["./notion2api", "--config", "/app/data/config.json"]
